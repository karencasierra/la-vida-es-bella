<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA VIDA ES BELLA | GASTROBAR</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #FFD700; 
            --oro-mate: #D4AF37;
            --cian: #00FBFF;
            --fondo: #000000;
            --gris-card: #121212;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: white;
            overflow-x: hidden;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        .logo-principal { width: 75px; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
        header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--oro); margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        .direccion { font-size: 0.65rem; color: #888; text-transform: uppercase; }

        /* Riel de Fotos */
        .swiper { width: 95%; max-width: 800px; height: 220px; margin: 15px auto; border-radius: 20px; border: 1px solid #222; }
        .swiper-slide { position: relative; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-caption { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: var(--oro); padding: 8px; font-size: 0.8rem; font-weight: bold; text-align: center; text-transform: uppercase; }

        /* Banner Domicilio */
        .banner-domi {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #1a1a1a; margin: 10px 15px; padding: 12px; border-radius: 12px; border: 1px solid #333;
        }
        .banner-domi i { color: var(--oro); font-size: 1.4rem; }
        .banner-domi p { margin: 0; font-size: 0.7rem; font-weight: 600; color: var(--oro-mate); text-transform: uppercase; }

        /* Categorías */
        .categorias { display: flex; gap: 10px; padding: 15px; overflow-x: auto; justify-content: flex-start; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 100; scrollbar-width: none; }
        .btn-cat { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 18px; border-radius: 20px; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .btn-cat.active { background: var(--oro); color: black; font-weight: bold; }

        /* Menú */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .container { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--gris-card); border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; height: 100%; border: 1px solid #222; }
        .info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info h3 { font-size: 0.8rem; margin: 0 0 8px; color: #fff; text-transform: uppercase; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .precio { color: var(--cian); font-weight: 700; font-size: 1.1rem; margin-bottom: 12px; }
        .btn-add { width: 100%; background: transparent; border: 1.5px solid var(--oro-mate); color: var(--oro-mate); padding: 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* Carrito y Modal */
        .cart-btn { position: fixed; bottom: 25px; right: 20px; background: var(--oro); color: black; padding: 15px 20px; border-radius: 50px; font-weight: 800; display: flex; align-items: center; gap: 10px; z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.6); cursor: pointer; }
        #modalCarrito { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; }
        .modal-content { background: #111; margin: 10% auto; padding: 20px; width: 85%; max-width: 380px; border-radius: 15px; border: 1px solid var(--oro); text-align: center; }
        .item-pedido { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; margin: 10px 0; border-bottom: 1px solid #222; padding-bottom: 8px; color: white; }
        .btn-del { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 1.1rem; margin-left: 10px; }

        /* Footer */
        footer { text-align: center; padding: 40px 20px 120px; border-top: 1px solid #222; background: #050505; }
        footer h4 { color: var(--oro); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .social-icons { display: flex; justify-content: center; gap: 30px; }
        .social-icons a { color: var(--oro-mate); font-size: 1.8rem; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpeg.jpeg" class="logo-principal">
    <h1>LA VIDA ES BELLA</h1>
    <div class="direccion">Frente al antiguo Seguro Social - Tumaco</div>
</header>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="riel-fotos"></div>
</div>

<div class="banner-domi">
    <i class="fas fa-motorcycle"></i>
    <p>¡Contamos con Domicilio! Escríbenos</p>
</div>

<div class="categorias">
    <button class="btn-cat active" onclick="filtrar('todos', this)">TODOS</button>
    <button class="btn-cat" onclick="filtrar('almuerzo', this)">🍽️ ALMUERZOS</button>
    <button class="btn-cat" onclick="filtrar('carnes', this)">🥩 CARNES</button>
    <button class="btn-cat" onclick="filtrar('mariscos', this)">🦐 MARISCOS</button>
    <button class="btn-cat" onclick="filtrar('rapida', this)">🍔 RÁPIDAS</button>
    <button class="btn-cat" onclick="filtrar('bebidas', this)">🍹 BEBIDAS</button>
    <button class="btn-cat" onclick="filtrar('cocteles', this)">🍸 COCTELES</button>
</div>

<div class="container" id="menu-items"></div>

<footer>
    <h4>Contáctanos y Síguenos</h4>
    <div class="social-icons">
        <a href="https://wa.me/57324881652"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/p/GastroBar-La-Vida-es-Bella-61554548353990/"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/lavidaesbella_gastrobar/"><i class="fab fa-instagram"></i></a>
    </div>
</footer>

<div class="cart-btn" onclick="verPedido()">
    <i class="fas fa-shopping-cart"></i>
    <span id="resumen-total">$0 (0)</span>
</div>

<div id="modalCarrito">
    <div class="modal-content">
        <h3 style="color:var(--oro)">TU PEDIDO</h3>
        <input type="number" id="mesa" placeholder="N° Mesa" style="width:80%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #333; border-radius:8px; text-align:center;">
        <div id="lista-pedido" style="margin-bottom:15px; max-height:250px; overflow-y:auto; padding: 0 5px;"></div>
        <div id="total-pedido" style="font-weight:bold; color:var(--cian); margin-bottom:15px; border-top: 1px solid #333; padding-top: 10px;">Total: $0</div>
        <button onclick="enviarWhatsApp()" style="width:100%; padding:14px; background:var(--oro); border:none; border-radius:8px; font-weight:bold; cursor:pointer; text-transform: uppercase;">ENVIAR A WHATSAPP</button>
        <p onclick="document.getElementById('modalCarrito').style.display='none'" style="margin-top:20px; font-size:0.8rem; color:#888; cursor:pointer; text-decoration: underline;">SEGUIR COMPRANDO</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const PRODUCTOS = [
        // LO QUE YA TENÍAS (ALMUERZOS Y RÁPIDAS)
        { cat: 'almuerzo', nombre: 'Almuerzo Ejecutivo', precio: 15000, img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500' },
        { cat: 'almuerzo', nombre: 'Punta de Anca Grill', precio: 32000, img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=500' },
        { cat: 'almuerzo', nombre: 'Pechuga a la Plancha', precio: 22000, img: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=500' },
        { cat: 'almuerzo', nombre: 'Bandeja Paisa', precio: 25000, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvPzmg8pTnT5itu8TXhOhvXL33m4x4qsXPjg&sw=500' },
        { cat: 'rapida', nombre: 'Hamburguesa La Bella', precio: 18000 },
        { cat: 'rapida', nombre: 'Perro Caliente Especial', precio: 14000 },
        { cat: 'rapida', nombre: 'Salchipapa con Queso', precio: 20000 },
        { cat: 'rapida', nombre: 'Club House Sandwich', precio: 16000 },

        // CARNES (DEL PDF) [cite: 4]
        { cat: 'carnes', nombre: 'Ceviche de Chicharrón', precio: 33000 },
        { cat: 'carnes', nombre: 'Picada de Carne Personal', precio: 44000 },
        { cat: 'carnes', nombre: 'Picada de Carne (2 Personas)', precio: 78000 },
        { cat: 'carnes', nombre: 'Filete de Res a la Plancha', precio: 40000 },
        { cat: 'carnes', nombre: 'Filete de Pollo a la Plancha', precio: 37000 },
        { cat: 'carnes', nombre: 'Filete de Cerdo a la Plancha', precio: 39000 },
        { cat: 'carnes', nombre: 'Costilla BBQ', precio: 45000 },
        { cat: 'carnes', nombre: 'Costilla Ahumada', precio: 42000 },
        { cat: 'carnes', nombre: 'Chuleta de Pollo', precio: 39000 },
        { cat: 'carnes', nombre: 'Chuleta de Cerdo', precio: 41000 },

        // MARISCOS (DEL PDF) [cite: 7]
        { cat: 'mariscos', nombre: 'Picada Marinera Personal', precio: 62000 },
        { cat: 'mariscos', nombre: 'Picada Marinera (2) Personas', precio: 96000 },
        { cat: 'mariscos', nombre: 'Picada Mixta Personal', precio: 62000 },
        { cat: 'mariscos', nombre: 'Picada Mixta (2) Personas', precio: 96000 },
        { cat: 'mariscos', nombre: 'Pastas Marineras', precio: 61000 },
        { cat: 'mariscos', nombre: 'Pastas de Camarón', precio: 53000 },
        { cat: 'mariscos', nombre: 'Langostinos Apanados', precio: 66000 },
        { cat: 'mariscos', nombre: 'Camarones Apanados', precio: 50000 },
        { cat: 'mariscos', nombre: 'Ceviche de Camarón', precio: 44000 },
        { cat: 'mariscos', nombre: 'Cazuela de Camarón', precio: 57000 },
        { cat: 'mariscos', nombre: 'Ceviche de Concha', precio: 47000 },
        { cat: 'mariscos', nombre: 'Ceviche Mixto', precio: 41000 },
        { cat: 'mariscos', nombre: 'Corvina Apanada', precio: 51000 },
        { cat: 'mariscos', nombre: 'Corvina al Ajillo', precio: 62000 },
        { cat: 'mariscos', nombre: 'Cazuela Marinera', precio: 62000 },
        { cat: 'mariscos', nombre: 'Pargo Frito (450-550 Gr)', precio: 57000 },
        { cat: 'mariscos', nombre: 'Arroz Marinero', precio: 55000 },
        { cat: 'mariscos', nombre: 'Arroz de Camarón', precio: 50000 },

        // BEBIDAS (DEL PDF) [cite: 12, 13, 15, 17, 19, 21]
        { cat: 'bebidas', nombre: 'Michelada Cerveza/Soda', precio: 14000 },
        { cat: 'bebidas', nombre: 'Limonada Natural', precio: 12000 },
        { cat: 'bebidas', nombre: 'Limonada Cerezada', precio: 17000 },
        { cat: 'bebidas', nombre: 'Soda Frutos Rojos', precio: 18000 },
        { cat: 'bebidas', nombre: 'Granizado en Agua', precio: 14000 },
        { cat: 'bebidas', nombre: 'Granizado en Leche', precio: 17000 },
        { cat: 'bebidas', nombre: 'Cerveza Nacional', precio: 5000 },
        { cat: 'bebidas', nombre: 'Jugo Hit', precio: 5000 },
        { cat: 'bebidas', nombre: 'Agua', precio: 3000 },

        // COCTELES (DEL PDF) [cite: 28-40]
        { cat: 'cocteles', nombre: 'Coctel La Vida es Bella', precio: 31000 },
        { cat: 'cocteles', nombre: 'Margarita', precio: 29000 },
        { cat: 'cocteles', nombre: 'Laguna Azul', precio: 31000 },
        { cat: 'cocteles', nombre: 'Piña Colada', precio: 31000 },
        { cat: 'cocteles', nombre: 'Orgasmo', precio: 35000 },
        { cat: 'cocteles', nombre: 'Caipirinha', precio: 29000 },
        { cat: 'cocteles', nombre: 'Cuba Libre', precio: 23000 },
        { cat: 'cocteles', nombre: 'Sexo en la Playa', precio: 31000 }
    ];

    let carrito = [];

    function cargarRiel() {
        const almuerzos = PRODUCTOS.filter(p => p.cat === 'almuerzo');
        document.getElementById('riel-fotos').innerHTML = almuerzos.map(p => `
            <div class="swiper-slide">
                <img src="${p.img}">
                <div class="slide-caption">${p.nombre}</div>
            </div>
        `).join('');
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 3000 } });
    }

    function renderMenu(lista) {
        document.getElementById('menu-items').innerHTML = lista.map(p => `
            <div class="card">
                <div class="info">
                    <h3>${p.nombre}</h3>
                    <span class="precio">$${p.precio.toLocaleString()}</span>
                    <button class="btn-add" onclick="agregar('${p.nombre}', ${p.precio})">AGREGAR</button>
                </div>
            </div>
        `).join('');
    }

    function agregar(nombre, precio) {
        const item = carrito.find(i => i.nombre === nombre);
        if (item) { item.cantidad++; } 
        else { carrito.push({ nombre, precio, cantidad: 1 }); }
        actualizarResumen();
    }

    function eliminar(nombre) {
        const index = carrito.findIndex(i => i.nombre === nombre);
        if (index !== -1) {
            if (carrito[index].cantidad > 1) {
                carrito[index].cantidad--;
            } else {
                carrito.splice(index, 1);
            }
        }
        actualizarResumen();
        verPedido(); // Refresca el modal para mostrar el cambio
    }

    function actualizarResumen() {
        const total = carrito.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
        const cant = carrito.reduce((acc, i) => acc + i.cantidad, 0);
        document.getElementById('resumen-total').innerText = `$${total.toLocaleString()} (${cant})`;
    }

    function verPedido() {
        if (carrito.length === 0) {
            document.getElementById('modalCarrito').style.display = 'none';
            return alert("El carrito está vacío");
        }
        document.getElementById('modalCarrito').style.display = 'block';
        document.getElementById('lista-pedido').innerHTML = carrito.map(i => `
            <div class="item-pedido">
                <span><strong>${i.cantidad}x</strong> ${i.nombre}</span>
                <div style="display:flex; align-items:center;">
                    <span>$${(i.precio * i.cantidad).toLocaleString()}</span>
                    <button class="btn-del" onclick="eliminar('${i.nombre}')"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        `).join('');
        const total = carrito.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
        document.getElementById('total-pedido').innerText = `Total: $${total.toLocaleString()}`;
    }

    function enviarWhatsApp() {
        const mesa = document.getElementById('mesa').value;
        if (!mesa) return alert("Por favor, ingresa el número de mesa");
        let txt = `*NUEVO PEDIDO - MESA ${mesa}*\n\n`;
        carrito.forEach(i => txt += `✅ ${i.cantidad}x ${i.nombre} - $${(i.precio * i.cantidad).toLocaleString()}\n`);
        const total = carrito.reduce((acc, i) => acc + (i.precio * i.cantidad), 0);
        txt += `\n*TOTAL A PAGAR: $${total.toLocaleString()}*`;
        window.open(`https://wa.me/57324881652?text=${encodeURIComponent(txt)}`);
    }

    function filtrar(cat, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMenu(cat === 'todos' ? PRODUCTOS : PRODUCTOS.filter(p => p.cat === cat));
    }

    cargarRiel();
    renderMenu(PRODUCTOS);
</script>
</body>
</html>
