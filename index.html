<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA VIDA ES BELLA | GASTROBAR</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #FFD700; 
            --oro-mate: #D4AF37;
            --cian: #00FBFF;
            --fondo: #000000;
            --gris-card: #121212;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: white;
            overflow-x: hidden;
        }

        header { padding: 30px 20px 10px; text-align: center; }
        .logo-principal { width: 75px; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
        header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--oro); margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        .direccion { font-size: 0.65rem; color: #888; text-transform: uppercase; }

        .swiper { width: 95%; max-width: 800px; height: 220px; margin: 15px auto; border-radius: 20px; border: 1px solid #222; }
        .swiper-slide { position: relative; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-caption { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: var(--oro); padding: 8px; font-size: 0.8rem; font-weight: bold; text-align: center; text-transform: uppercase; }

        .banner-domi {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #1a1a1a; margin: 10px 15px; padding: 12px; border-radius: 12px; border: 1px solid #333;
        }
        .banner-domi i { color: var(--oro); font-size: 1.4rem; }
        .banner-domi p { margin: 0; font-size: 0.7rem; font-weight: 600; color: var(--oro-mate); text-transform: uppercase; }

        .categorias { display: flex; gap: 10px; padding: 15px; overflow-x: auto; justify-content: center; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 100; scrollbar-width: none; }
        .btn-cat { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 18px; border-radius: 20px; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; }
        .btn-cat.active { background: var(--oro); color: black; font-weight: bold; }

        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        @media (min-width: 768px) { .container { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--gris-card); border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; height: 100%; border: 1px solid #222; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info h3 { font-size: 0.8rem; margin: 0 0 8px; height: 38px; overflow: hidden; color: #fff; text-transform: uppercase; }
        .precio { color: var(--cian); font-weight: 700; font-size: 1.1rem; margin-bottom: 12px; }
        .btn-add { width: 100%; background: transparent; border: 1.5px solid var(--oro-mate); color: var(--oro-mate); padding: 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        footer { text-align: center; padding: 40px 20px 120px; border-top: 1px solid #222; background: #050505; }
        footer h4 { color: var(--oro); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .social-icons { display: flex; justify-content: center; gap: 30px; }
        .social-icons a { color: var(--oro-mate); font-size: 1.8rem; text-decoration: none; }

        .cart-btn { position: fixed; bottom: 25px; right: 20px; background: var(--oro); color: black; padding: 15px 20px; border-radius: 50px; font-weight: 800; display: flex; align-items: center; gap: 10px; z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.6); cursor: pointer; }
        #modalCarrito { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; }
        .modal-content { background: #111; margin: 15% auto; padding: 20px; width: 85%; max-width: 350px; border-radius: 15px; border: 1px solid var(--oro); text-align: center; }
        .item-pedido { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 8px; color: white; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpeg.jpeg" class="logo-principal">
    <h1>LA VIDA ES BELLA</h1>
    <div class="direccion">Frente al antiguo Seguro Social - Tumaco</div>
</header>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="riel-almuerzos"></div>
</div>

<div class="banner-domi">
    <i class="fas fa-motorcycle"></i>
    <p>¡Contamos con Domicilio! Escríbenos</p>
</div>

<div class="categorias">
    <button class="btn-cat active" onclick="filtrar('todos', this)">TODOS</button>
    <button class="btn-cat" onclick="filtrar('almuerzo', this)">🍽️ ALMUERZOS</button>
    <button class="btn-cat" onclick="filtrar('mar', this)">🦐 MAR</button>
    <button class="btn-cat" onclick="filtrar('rapida', this)">🍔 RÁPIDAS</button>
    <button class="btn-cat" onclick="filtrar('bebida', this)">🍹 BEBIDAS</button>
</div>

<div class="container" id="menu-items"></div>

<footer>
    <h4>Contáctanos y Síguenos</h4>
    <div class="social-icons">
        <a href="https://wa.me/57324881652"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/p/GastroBar-La-Vida-es-Bella-61554548353990/"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/lavidaesbella_gastrobar/"><i class="fab fa-instagram"></i></a>
    </div>
</footer>

<div class="cart-btn" onclick="verPedido()">
    <i class="fas fa-shopping-cart"></i>
    <span id="resumen-total">$0 (0)</span>
</div>

<div id="modalCarrito">
    <div class="modal-content">
        <h3 style="color:var(--oro)">TU PEDIDO</h3>
        <input type="number" id="mesa" placeholder="N° Mesa" style="width:80%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #333; border-radius:8px; text-align:center; font-size: 1rem;">
        <div id="lista-pedido" style="margin-bottom:20px; max-height:250px; overflow-y:auto; padding: 0 5px;"></div>
        <div id="total-pedido" style="font-weight:bold; color:var(--cian); margin-bottom:20px; font-size: 1.2rem; border-top: 1px solid var(--oro); padding-top: 10px;">Total: $0</div>
        <button onclick="enviarWhatsApp()" style="width:100%; padding:14px; background:var(--oro); border:none; border-radius:8px; font-weight:bold; cursor:pointer; text-transform: uppercase; font-size: 0.9rem;">ENVIAR PEDIDO</button>
        <p onclick="document.getElementById('modalCarrito').style.display='none'" style="margin-top:20px; font-size:0.85rem; color:#888; cursor:pointer; text-decoration: underline;">CERRAR Y SEGUIR COMPRANDO</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const PRODUCTOS = [
        { cat: 'mar', nombre: 'Cazuela de Mariscos Gold', precio: 38000, img: 'https://www.elespectador.com/resizer/pXpi8kkyhFeyYZ5Q7iaZ4BB61sg=/arc-anglerfish-arc2-prod-elespectador/public/MVSY2N7QVNHTJKSDLZZVKZIQTQ.jpg' },
        { cat: 'mar', nombre: 'Pargo Rojo Frito', precio: 34000, img: 'https://nochesclifton.com/wp-content/uploads/2024/10/Blood-sausage.-13-1.jpg' },
        { cat: 'mar', nombre: 'Ceviche de Camarón', precio: 32000, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSh2xMmw4bVT_0ygK1hTrPgthGXJjTbhThF8Q&s' },
        { cat: 'mar', nombre: 'Salmón en Salsa de Eneldo', precio: 42000, img: 'https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=500' },
        { cat: 'almuerzo', nombre: 'Almuerzo Ejecutivo', precio: 15000, img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500' },
        { cat: 'almuerzo', nombre: 'Punta de Anca Grill', precio: 32000, img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=500' },
        { cat: 'almuerzo', nombre: 'Pechuga a la Plancha', precio: 22000, img: 'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=500' },
        { cat: 'almuerzo', nombre: 'Bandeja Paisa', precio: 25000, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvPzmg8pTnT5itu8TXhOhvXL33m4x4qsXPjg&sw=500' },
        { cat: 'rapida', nombre: 'Hamburguesa La Bella', precio: 18000, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' },
        { cat: 'rapida', nombre: 'Perro Caliente Especial', precio: 14000, img: 'https://img-global.cpcdn.com/recipes/8770acd028f8cd4a/120x160cq50/perro-caliente-caseros-foto-principal.jpg' },
        { cat: 'rapida', nombre: 'Salchipapa con Queso', precio: 20000, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZIGaBqyLhUky8mEgta33rkh-3Nk-wjt75Ng&s' },
        { cat: 'rapida', nombre: 'Club House Sandwich', precio: 16000, img: 'https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=500' },
        { cat: 'bebida', nombre: 'Mojito Maracuyá', precio: 12000, img: 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=500' },
        { cat: 'bebida', nombre: 'Limonada de Coco', precio: 9000, img: 'https://cdn.zyrosite.com/cdn-cgi/image/format=auto,w=375,h=375,fit=scale-down/cdn-ecommerce/store_01JJADVM5E8SXR9HKC2HMH4718%2Fassets%2F1738691234765-limonadadecoco2.jpg' }
    ];

    let carrito = [];

    function cargarRiel() {
        const almuerzos = PRODUCTOS.filter(p => p.cat === 'almuerzo');
        document.getElementById('riel-almuerzos').innerHTML = almuerzos.map(p => `
            <div class="swiper-slide">
                <img src="${p.img}">
                <div class="slide-caption">${p.nombre}</div>
            </div>
        `).join('');
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 3000 } });
    }

    function renderMenu(lista) {
        document.getElementById('menu-items').innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.img}">
                <div class="info">
                    <h3>${p.nombre}</h3>
                    <span class="precio">$${p.precio.toLocaleString()}</span>
                    <button class="btn-add" onclick="agregar('${p.nombre}', ${p.precio})">AGREGAR</button>
                </div>
            </div>
        `).join('');
    }

    // --- FUNCIÓN AGREGAR (SIN DUPLICADOS) ---
    function agregar(nombre, precio) {
        // Buscamos el plato exacto por nombre
        const index = carrito.findIndex(item => item.nombre === nombre);

        if (index !== -1) {
            // SI YA EXISTE: Sumamos 1 a la cantidad
            carrito[index].cantidad++;
        } else {
            // SI NO EXISTE: Lo agregamos como nuevo
            carrito.push({ nombre: nombre, precio: precio, cantidad: 1 });
        }
        
        actualizarResumen();
    }

    function actualizarResumen() {
        const totalDinero = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
        const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
        document.getElementById('resumen-total').innerText = `$${totalDinero.toLocaleString()} (${totalItems})`;
    }

    function verPedido() {
        if (carrito.length === 0) return alert("Tu pedido está vacío");
        
        document.getElementById('modalCarrito').style.display = 'block';
        const listaPedido = document.getElementById('lista-pedido');
        listaPedido.innerHTML = "";

        // Generar la lista visual sumando las cantidades
        carrito.forEach(item => {
            const subtotal = item.precio * item.cantidad;
            listaPedido.innerHTML += `
                <div class="item-pedido">
                    <span><strong>${item.cantidad}x</strong> ${item.nombre}</span>
                    <span>$${subtotal.toLocaleString()}</span>
                </div>
            `;
        });

        const totalFinal = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
        document.getElementById('total-pedido').innerText = `Total: $${totalFinal.toLocaleString()}`;
    }

    function enviarWhatsApp() {
        const mesa = document.getElementById('mesa').value;
        if (!mesa) return alert("Por favor, ingresa el número de mesa.");

        let texto = `*NUEVO PEDIDO - LA VIDA ES BELLA*\n`;
        texto += `*MESA:* ${mesa}\n`;
        texto += `----------------------------\n`;

        carrito.forEach(item => {
            texto += `✅ ${item.cantidad}x ${item.nombre} - $${(item.precio * item.cantidad).toLocaleString()}\n`;
        });

        const totalFinal = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
        texto += `----------------------------\n`;
        texto += `*TOTAL FINAL: $${totalFinal.toLocaleString()}*`;

        window.open(`https://wa.me/57324881652?text=${encodeURIComponent(texto)}`);
    }

    function filtrar(cat, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMenu(cat === 'todos' ? PRODUCTOS : PRODUCTOS.filter(p => p.cat === cat));
    }

    cargarRiel();
    renderMenu(PRODUCTOS);
</script>
</body>
</html>
