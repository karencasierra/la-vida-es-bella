<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vida es Bella | Gastrobar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --oro: #d4af37;
            --oro-suave: #e5c07b;
            --cian: #00e5ff;
            --negro-fondo: #0a0a0a;
            --negro-card: #141414;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--negro-fondo); 
            color: white; 
        }

        /* DISEÑO DE LAS CAPTURAS */
        .carrito-resumen {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 1000;
        }

        .status-bubble {
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 15px;
            border-left: 4px solid var(--oro);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .status-bubble b { color: var(--oro-suave); font-size: 1.1rem; }

        .btn-flotante {
            background-color: var(--oro-suave);
            color: black;
            padding: 15px 30px;
            border-radius: 35px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(229, 192, 123, 0.3);
            cursor: pointer;
        }

        /* MODAL ESTILO CAPTURA */
        #modalPedido {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
        }

        .modal-body {
            background: var(--negro-card);
            max-width: 450px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid #333;
        }

        .modal-body h2 { color: var(--oro-suave); font-family: serif; margin-bottom: 25px; }

        .item-pedido {
            background: #222;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-eliminar {
            background: #ff4444;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            padding: 15px;
            margin: 20px 0;
            box-sizing: border-box;
        }

        .total-texto {
            text-align: right;
            color: var(--cian);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .btn-confirmar {
            background-color: var(--oro-suave);
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div style="padding: 20px; text-align: center;">
    <h1 style="color: var(--oro-suave);">Menú Digital</h1>
    <div id="lista-productos" style="display: grid; gap: 15px;">
        </div>
</div>

<div class="carrito-resumen">
    <div class="status-bubble">
        <span>✅ <b>¡Listo para mesa!</b></span><br>
        <small style="color: #888;">⏱️ Calculando tiempo...</small>
    </div>
    <div class="btn-flotante" onclick="mostrarPedido()">
        <i class="fas fa-shopping-bag"></i>
        <span id="resumen-total">$0 (0)</span>
    </div>
</div>

<div id="modalPedido">
    <div class="modal-body">
        <h2>Mi Pedido</h2>
        <div id="items-contenedor"></div>
        
        <textarea id="notas" placeholder="¿Alguna instrucción especial? (Ej: Sin cebolla)"></textarea>
        
        <div class="total-texto">Total: <span id="monto-total">$0</span></div>
        
        <button class="btn-confirmar" onclick="enviarWhatsApp()">🚀 CONFIRMAR PEDIDO</button>
        <p onclick="cerrarPedido()" style="text-align:center; margin-top:15px; cursor:pointer; color:#888;">Seguir explorando</p>
    </div>
</div>

<script>
    const PRODUCTOS = [
        { id: 1, nombre: 'Pollo Asado con Papas', precio: 20000 },
        { id: 2, nombre: 'Hamburguesa Especial', precio: 18000 },
        { id: 3, nombre: 'Almuerzo Ejecutivo', precio: 15000 }
    ];

    let carrito = [];

    function renderProductos() {
        const cont = document.getElementById('lista-productos');
        cont.innerHTML = PRODUCTOS.map(p => `
            <div style="background:#141414; padding:20px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <b>${p.nombre}</b><br>
                    <span style="color:var(--cian)">$${p.precio.toLocaleString()}</span>
                </div>
                <button onclick="agregar(${p.id})" style="background:var(--oro-suave); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">+</button>
            </div>
        `).join('');
    }

    function agregar(id) {
        const p = PRODUCTOS.find(x => x.id === id);
        carrito.push(p);
        actualizarUI();
    }

    function eliminar(index) {
        carrito.splice(index, 1);
        actualizarUI();
        if(carrito.length > 0) mostrarPedido();
        else cerrarPedido();
    }

    function actualizarUI() {
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        document.getElementById('resumen-total').innerText = `$${total.toLocaleString()} (${carrito.length})`;
        document.getElementById('monto-total').innerText = `$${total.toLocaleString()}`;
    }

    function mostrarPedido() {
        const cont = document.getElementById('items-contenedor');
        cont.innerHTML = carrito.map((p, index) => `
            <div class="item-pedido">
                <span>${p.nombre}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <b>$${p.precio.toLocaleString()}</b>
                    <button class="btn-eliminar" onclick="eliminar(${index})">×</button>
                </div>
            </div>
        `).join('');
        document.getElementById('modalPedido').style.display = 'block';
    }

    function cerrarPedido() { document.getElementById('modalPedido').style.display = 'none'; }

    function enviarWhatsApp() {
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        const notas = document.getElementById('notas').value;
        const items = carrito.map(p => `- ${p.nombre}`).join('\n');
        
        const msg = `*NUEVO PEDIDO*\n${items}\n\n*Notas:* ${notas}\n*TOTAL:* $${total.toLocaleString()}`;
        window.open(`https://wa.me/573207999205?text=${encodeURIComponent(msg)}`);
    }

    renderProductos();
</script>

</body>
</html>
