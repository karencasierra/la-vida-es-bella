<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA VIDA ES BELLA | Gastrobar</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #FFD700; 
            --oro-mate: #D4AF37;
            --cian: #00FBFF;
            --fondo: #080808;
            --card: #1A1A1A;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: white;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            padding: 50px 20px;
            text-align: center;
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--oro-mate);
            object-fit: cover;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            margin-bottom: 15px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--oro), #FFF, var(--oro-mate));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-transform: uppercase; /* Asegura mayúsculas permanentes */
        }

        header p {
            color: var(--oro-mate);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: 600;
        }

        /* --- CATEGORÍAS --- */
        .categorias {
            display: flex;
            gap: 12px;
            padding: 15px;
            position: sticky;
            top: 0;
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            overflow-x: auto;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn-cat {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: #DDD;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-cat.active {
            background: var(--oro);
            color: black;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* --- GRID --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 25px;
            max-width: 1200px;
            margin: auto;
            padding-bottom: 120px;
        }

        .card {
            background: var(--card);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--oro-mate); }

        .card img { width: 100%; height: 200px; object-fit: cover; }

        .info { padding: 20px; text-align: center; }

        .precio {
            display: block;
            color: var(--cian);
            font-size: 1.4rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .btn-agregar {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--oro-mate);
            color: var(--oro-mate);
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-agregar:hover { background: var(--oro-mate); color: black; }

        /* --- CARRITO FLOTANTE --- */
        .carrito-float {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: var(--oro);
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        /* --- MODAL --- */
        #modalCarrito {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
        }

        .modal-content {
            background: #111;
            margin: 10% auto;
            padding: 30px;
            max-width: 400px;
            width: 85%;
            border-radius: 25px;
            border: 1px solid var(--oro-mate);
        }

        .item-carrito { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpeg" alt="Logo" class="logo-img">
    <h1>LA VIDA ES BELLA</h1>
    <p>Gastrobar</p>
</header>

<div class="categorias">
    <button class="btn-cat active" onclick="filtrar('todos', this)">Todos</button>
    <button class="btn-cat" onclick="filtrar('mar', this)">🦐 Mar</button>
    <button class="btn-cat" onclick="filtrar('almuerzo', this)">🍽️ Almuerzos</button>
    <button class="btn-cat" onclick="filtrar('rapida', this)">🍔 Rápidas</button>
    <button class="btn-cat" onclick="filtrar('bebida', this)">🍹 Bebidas</button>
</div>

<div class="container" id="menu-container"></div>

<div class="carrito-float" onclick="abrirCarrito()">
    <i class="fas fa-shopping-cart"></i>
    <span id="resumen-total">$0 (0)</span>
</div>

<div id="modalCarrito">
    <div class="modal-content">
        <h2 style="color:var(--oro); font-family: 'Playfair Display'; margin-top: 0;">Tu Pedido</h2>
        <div id="lista-carrito"></div>
        <textarea id="notas" placeholder="Instrucciones (ej. sin cebolla)" style="width:100%; background:#000; border:1px solid #333; color:white; padding:10px; margin:15px 0; border-radius:10px;"></textarea>
        <div style="font-size:1.5rem; font-weight:bold; text-align:right; margin-bottom:20px; color:var(--cian);">Total: <span id="modal-total">$0</span></div>
        <button onclick="enviarPedido()" style="width:100%; padding:15px; background:var(--oro); border:none; border-radius:15px; font-weight:bold; cursor:pointer;">🚀 PEDIR POR WHATSAPP</button>
        <p onclick="cerrarCarrito()" style="text-align:center; margin-top:15px; cursor:pointer; color:#888;">Cerrar</p>
    </div>
</div>

</body>
</html>
