<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA VIDA ES BELLA | GASTROBAR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --oro: #FFD700; 
            --oro-mate: #D4AF37;
            --cian: #00FBFF;
            --fondo: #080808;
            --card: #1A1A1A;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: white;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            padding: 60px 20px;
            text-align: center;
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--oro-mate);
            object-fit: cover;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 20px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #FFF 20%, var(--oro) 50%, var(--oro-mate) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8);
            font-weight: 900;
        }

        .tagline {
            color: var(--oro-mate);
            letter-spacing: 10px;
            text-transform: uppercase;
            font-size: 1rem;
            margin-top: 10px;
            font-weight: 600;
        }

        .direccion {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* --- DOMICILIOS INFO --- */
        .domicilios-banner {
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed var(--oro);
            margin: 20px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        /* --- CATEGORÍAS --- */
        .categorias {
            display: flex;
            gap: 12px;
            padding: 15px;
            position: sticky;
            top: 0;
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            overflow-x: auto;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn-cat {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: #DDD;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .btn-cat.active {
            background: var(--oro);
            color: black;
            font-weight: 700;
        }

        /* --- GRID --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 25px;
            max-width: 1200px;
            margin: auto;
            padding-bottom: 50px;
        }

        .card {
            background: var(--card);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 20px; text-align: center; }

        .precio {
            display: block;
            color: var(--cian);
            font-size: 1.4rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .btn-agregar {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--oro-mate);
            color: var(--oro-mate);
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- CONTACTOS --- */
        .social-contacts {
            margin: 40px auto;
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            max-width: 600px;
            padding-bottom: 120px;
        }
        .social-contacts h3 {
            color: var(--oro);
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .social-icons-wrapper {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .social-icon {
            color: var(--oro-mate);
            font-size: 2.2rem;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-icon:hover { transform: scale(1.2); color: var(--oro); }

        /* --- CARRITO --- */
        .carrito-float {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: var(--oro);
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        #modalCarrito {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
        }

        .modal-content {
            background: #111;
            margin: 10% auto;
            padding: 30px;
            max-width: 400px;
            width: 85%;
            border-radius: 25px;
            border: 1px solid var(--oro-mate);
        }

        .item-carrito { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpeg.jpeg" alt="Logo" class="logo-img">
    <h1>LA VIDA ES BELLA</h1>
    <div class="tagline">GASTROBAR</div>
    <div class="direccion">Avenida de los Estudiantes frente al antiguo Seguro Social - Tumaco</div>
    
    <div class="domicilios-banner">
        <span style="color:var(--oro); font-weight: bold;">🛵 ¡DOMICILIOS ACTIVOS!</span><br>
        <small>Pide ahora al 324 881 652</small>
    </div>
</header>

<div class="categorias">
    <button class="btn-cat active" onclick="filtrar('todos', this)">TODOS</button>
    <button class="btn-cat" onclick="filtrar('mar', this)">🦐 MAR</button>
    <button class="btn-cat" onclick="filtrar('almuerzo', this)">🍽️ ALMUERZOS</button>
    <button class="btn-cat" onclick="filtrar('rapida', this)">🍔 RÁPIDAS</button>
    <button class="btn-cat" onclick="filtrar('bebida', this)">🍹 BEBIDAS</button>
</div>

<div class="container" id="menu-container"></div>

<div class="social-contacts">
    <h3>CONTÁCTANOS</h3>
    <div class="social-icons-wrapper">
        <a href="https://wa.me/57324881652" target="_blank" class="social-icon"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/p/GastroBar-La-Vida-es-Bella-61554548353990/" target="_blank" class="social-icon"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/lavidaesbella_gastrobar/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="tel:+57324881652" class="social-icon"><i class="fas fa-phone-alt"></i></a>
    </div>
</div>

<div class="carrito-float" onclick="abrirCarrito()">
    <i class="fas fa-shopping-cart"></i>
    <span id="resumen-total">$0 (0)</span>
</div>

<div id="modalCarrito">
    <div class="modal-content">
        <h2 style="color:var(--oro); font-family: 'Playfair Display'; margin-top: 0; text-transform: uppercase;">Tu Pedido</h2>
        <div id="lista-carrito"></div>
        <textarea id="notas" placeholder="Ej. Sin cebolla, dirección de entrega..." style="width:100%; background:#000; border:1px solid #333; color:white; padding:10px; margin:15px 0; border-radius:10px;"></textarea>
        <div style="font-size:1.5rem; font-weight:bold; text-align:right; margin-bottom:20px; color:var(--cian);">Total: <span id="modal-total">$0</span></div>
        <button onclick="enviarPedido()" style="width:100%; padding:15px; background:var(--oro); border:none; border-radius:15px; font-weight:bold; cursor:pointer; text-transform: uppercase;">🚀 PEDIR DOMICILIO (WHATSAPP)</button>
        <p onclick="cerrarCarrito()" style="text-align:center; margin-top:15px; cursor:pointer; color:#888; text-transform: uppercase;">Cerrar</p>
    </div>
</div>

<script>
    const PRODUCTOS = [
        { cat: 'almuerzo', nombre: 'Almuerzo Ejecutivo', precio: 16000, img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500' },
        { cat: 'mar', nombre: 'Cazuela de Mariscos Gold', precio: 38000, img: 'https://www.elespectador.com/resizer/pXpi8kkyhFeyYZ5Q7iaZ4BB61sg=/arc-anglerfish-arc2-prod-elespectador/public/MVSY2N7QVNHTJKSDLZZVKZIQTQ.jpg' },
        { cat: 'mar', nombre: 'Pargo Rojo Frito', precio: 34000, img: 'https://nochesclifton.com/wp-content/uploads/2024/10/Blood-sausage.-13-1.jpg' },
        { cat: 'mar', nombre: 'Ceviche de Camarón ', precio: 32000, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSh2xMmw4bVT_0ygK1hTrPgthGXJjTbhThF8Q&s' },
        { cat: 'almuerzo', nombre: 'Punta de Anca Grill', precio: 32000, img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=500' },
        { cat: 'rapida', nombre: 'Hamburguesa La Bella', precio: 18000, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' },
        { cat: 'rapida', nombre: 'Perro Caliente Especial', precio: 14000, img: 'https://img-global.cpcdn.com/recipes/8770acd028f8cd4a/120x160cq50/perro-caliente-caseros-foto-principal.jpg' },
        { cat: 'bebida', nombre: 'Mojito Maracuyá', precio: 12000, img: 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=500' },
        { cat: 'bebida', nombre: 'Limonada de Coco', precio: 9000, img: 'https://cdn.zyrosite.com/cdn-cgi/image/format=auto,w=375,h=375,fit=scale-down/cdn-ecommerce/store_01JJADVM5E8SXR9HKC2HMH4718%2Fassets%2F1738691234765-limonadadecoco2.jpg' }
    ];

    let carrito = [];

    function renderMenu(productosFiltrados) {
        const container = document.getElementById('menu-container');
        container.innerHTML = productosFiltrados.map((p) => `
            <div class="card">
                <img src="${p.img}" alt="${p.nombre}">
                <div class="info">
                    <h3 style="margin:0; text-transform: uppercase; font-size: 1.1rem;">${p.nombre}</h3>
                    <span class="precio">$${p.precio.toLocaleString()}</span>
                    <button class="btn-agregar" onclick="agregarAlCarrito('${p.nombre}', ${p.precio})">AGREGAR AL PEDIDO</button>
                </div>
            </div>
        `).join('');
    }

    function filtrar(categoria, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtrados = categoria === 'todos' ? PRODUCTOS : PRODUCTOS.filter(p => p.cat === categoria);
        renderMenu(filtrados);
    }

    function agregarAlCarrito(nombre, precio) {
        carrito.push({ nombre, precio });
        actualizarResumen();
    }

    function actualizarResumen() {
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        document.getElementById('resumen-total').innerText = `$${total.toLocaleString()} (${carrito.length})`;
    }

    function abrirCarrito() {
        const modal = document.getElementById('modalCarrito');
        const lista = document.getElementById('lista-carrito');
        modal.style.display = 'block';
        lista.innerHTML = carrito.map((item) => `
            <div class="item-carrito">
                <span>${item.nombre}</span>
                <span>$${item.precio.toLocaleString()}</span>
            </div>
        `).join('');
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        document.getElementById('modal-total').innerText = `$${total.toLocaleString()}`;
    }

    function cerrarCarrito() { document.getElementById('modalCarrito').style.display = 'none'; }

    function enviarPedido() {
        if (carrito.length === 0) return alert("El carrito está vacío");
        const notas = document.getElementById('notas').value;
        let mensaje = "¡Hola La Vida es Bella! Quisiera pedir un domicilio:\n\n";
        carrito.forEach(p => mensaje += `- ${p.nombre.toUpperCase()} ($${p.precio})\n`);
        const total = carrito.reduce((sum, p) => sum + p.precio, 0);
        mensaje += `\n*TOTAL: $${total.toLocaleString()}*`;
        if(notas) mensaje += `\n\n*Dirección/Notas:* ${notas}`;
        
        const url = `https://wa.me/57324881652?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }

    renderMenu(PRODUCTOS);
</script>

</body>
</html>
