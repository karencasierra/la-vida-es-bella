<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Comandas | La Vida es Bella</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0e10;
            --surface: #16191d;
            --accent: #c5a059; 
            --text-main: #e1e1e1;
            --text-dim: #71777e;
            --border: #262a2f;
            --danger: #ff4d4d;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
            transition: background 0.3s ease;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--border);
            padding-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }

        .brand { font-size: 1.4rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        .top-stats { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .stat-badge { 
            background: var(--surface); padding: 8px 15px; border-radius: 8px; 
            border: 1px solid var(--border); font-size: 0.75rem; font-weight: 700;
        }

        /* DISEÑO DE COLUMNAS (KANBAN) */
        .contenedor-estados {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; align-items: start;
        }

        .columna {
            background: #101214; padding: 15px; border-radius: 12px;
            border: 1px solid var(--border); min-height: 80vh;
        }

        .columna h3 {
            text-align: center; margin-bottom: 15px; color: var(--accent);
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid #222; padding-bottom: 10px;
        }

        .card-pedido {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 15px; margin-bottom: 15px;
            position: relative; animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.7rem; color: var(--text-dim); }
        .mesa-id { font-size: 1.2rem; font-weight: 800; margin: 5px 0; color: #fff; }

        .lista-productos { margin: 10px 0; padding: 0; list-style: none; }
        .lista-productos li { 
            padding: 8px 0; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; font-size: 0.9rem;
        }

        .footer-card { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 10px; }
        .total-monto { font-size: 1.1rem; font-weight: 800; color: var(--accent); }

        .btn-group { display: flex; gap: 4px; margin-top: 10px; }
        .btn { 
            flex: 1; border: none; padding: 10px; border-radius: 6px; cursor: pointer;
            font-size: 0.65rem; font-weight: 700; background: #252a30; color: white;
            transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.2); }
        .btn-prep { background: var(--warning); color: black; }
        .btn-listo { background: var(--success); }
        .btn-ok { background: var(--info); }
        .btn-limpiar { background: var(--danger); }

        /* ALERTAS */
        @keyframes parpadeo {
            0% { box-shadow: 0 0 0px var(--danger); }
            50% { box-shadow: 0 0 15px var(--danger); }
            100% { box-shadow: 0 0 0px var(--danger); }
        }
        .critico { animation: parpadeo 1s infinite; border-color: var(--danger); }

        .vacio { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="brand">Control <span style="font-weight:300; opacity:0.4">| La Vida es Bella</span></div>
        <div class="top-stats">
            <div class="stat-badge" id="ventas-total" style="color:var(--accent)">$0</div>
            <button onclick="modoCocina()" class="btn"><i class="fas fa-expand"></i> COCINA</button>
            <button onclick="limpiarEntregados()" class="btn btn-limpiar"><i class="fas fa-broom"></i> LIMPIAR</button>
        </div>
    </header>

    <div class="contenedor-estados">
        <div class="columna">
            <h3>🆕 Nuevos</h3>
            <div id="col-pendiente"></div>
        </div>
        <div class="columna">
            <h3>🔥 Preparando</h3>
            <div id="col-preparando"></div>
        </div>
        <div class="columna">
            <h3>✅ Listos</h3>
            <div id="col-listo"></div>
        </div>
        <div class="columna">
            <h3>📦 Entregados</h3>
            <div id="col-entregado"></div>
        </div>
    </div>

    <audio id="sonido-nuevo" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sonido-listo" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDlGrzItpJAhtlrDyXLbIX46osGOk3k2s",
            authDomain: "la-vida-es-bella-a2e72.firebaseapp.com",
            databaseURL: "https://la-vida-es-bella-a2e72-default-rtdb.firebaseio.com",
            projectId: "la-vida-es-bella-a2e72",
            storageBucket: "la-vida-es-bella-a2e72.firebasestorage.app",
            messagingSenderId: "622395641878",
            appId: "1:622395641878:web:bc3afbeb29d73a59e8a537"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let prevCount = 0;

        db.ref("pedidos").on("value", (snap) => {
            const data = snap.val() || {};
            renderizar(data);
        });

        function renderizar(data) {
            const cols = {
                pendiente: document.getElementById("col-pendiente"),
                preparando: document.getElementById("col-preparando"),
                listo: document.getElementById("col-listo"),
                entregado: document.getElementById("col-entregado")
            };

            // Limpiar columnas
            Object.values(cols).forEach(c => c.innerHTML = "");

            let totalVentas = 0;
            let currentActivos = 0;
            const items = Object.entries(data).sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));

            items.forEach(([id, p]) => {
                const estado = p.estado || 'pendiente';
                if (estado === 'entregado') totalVentas += (p.total || 0);
                if (estado === 'pendiente') currentActivos++;

                const min = p.timestamp ? Math.floor((Date.now() - p.timestamp) / 60000) : 0;
                const urgencia = (estado !== 'entregado' && min >= 15) ? 'critico' : '';

                const html = `
                    <div class="card-pedido ${urgencia}" data-time="${p.timestamp}">
                        <div class="card-header">
                            <span class="tiempo-txt"><i class="far fa-clock"></i> Hace ${min}m</span>
                            <span>#${id.slice(-4).toUpperCase()}</span>
                        </div>
                        <h2 class="mesa-id">Mesa ${p.mesa}</h2>
                        <ul class="lista-productos">
                            ${(p.items || []).map(i => `<li>${i.nombre} <span>$${(i.precio || 0).toLocaleString()}</span></li>`).join('')}
                        </ul>
                        <div class="footer-card">
                            <span class="total-monto">$${(p.total || 0).toLocaleString()}</span>
                            <button class="btn" style="width:40px" onclick="borrar('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="btn-group">
                            ${estado === 'pendiente' ? `<button class="btn btn-prep" onclick="cambiarEstado('${id}','preparando')">PREPARAR</button>` : ''}
                            ${estado === 'preparando' ? `<button class="btn btn-listo" onclick="cambiarEstado('${id}','listo')">LISTO</button>` : ''}
                            ${estado === 'listo' ? `<button class="btn btn-ok" onclick="cambiarEstado('${id}','entregado')">ENTREGAR</button>` : ''}
                        </div>
                    </div>
                `;

                if (cols[estado]) cols[estado].insertAdjacentHTML("beforeend", html);
            });

            // Notificaciones
            if (currentActivos > prevCount && prevCount !== 0) {
                document.getElementById("sonido-nuevo").play().catch(()=>{});
                document.body.style.background = "#251414";
                setTimeout(() => { document.body.style.background = "var(--bg)"; }, 400);
            }
            prevCount = currentActivos;
            document.getElementById("ventas-total").innerText = `$${totalVentas.toLocaleString()}`;
        }

        function cambiarEstado(id, st) {
            db.ref("pedidos/" + id).update({ estado: st });
            if (st === "listo") document.getElementById("sonido-listo").play().catch(()=>{});
        }

        function borrar(id) { if(confirm("¿Eliminar este pedido?")) db.ref("pedidos/" + id).remove(); }

        function limpiarEntregados() {
            if(!confirm("¿Borrar historial de entregados?")) return;
            db.ref("pedidos").once("value", snap => {
                snap.forEach(child => { if(child.val().estado === "entregado") child.ref.remove(); });
            });
        }

        function modoCocina() {
            const currentZoom = document.body.style.zoom || "1";
            document.body.style.zoom = currentZoom === "1" ? "1.2" : "1";
        }

        // Actualizar los textos de tiempo cada minuto
        setInterval(() => {
            document.querySelectorAll(".card-pedido").forEach(card => {
                const time = card.getAttribute("data-time");
                const min = Math.floor((Date.now() - parseInt(time)) / 60000);
                card.querySelector(".tiempo-txt").innerHTML = `<i class="far fa-clock"></i> Hace ${min}m`;
            });
        }, 60000);
    </script>
</body>
</html>
