<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ventas | La Vida es Bella</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: #f4f7f6; /* Fondo claro para mejor lectura de datos */
            color: #333;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar de navegación rápida */
        .sidebar {
            width: 240px;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 { color: #c5a059; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 20px; }

        .content {
            margin-left: 280px;
            padding: 40px;
            width: calc(100% - 280px);
        }

        /* Indicadores numéricos */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card h3 { margin: 0; font-size: 0.85rem; color: #888; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 600; color: #1a1a1a; }

        /* Área de Gráfica */
        .chart-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        /* Tabla de transacciones recientes */
        .table-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th { background: #f8f9fa; color: #666; text-align: left; padding: 15px; font-size: 0.9rem; }
        td { padding: 15px; border-top: 1px solid #eee; font-size: 0.9rem; }
        
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ADMIN GASTROBAR</h2>
        <p style="font-size: 0.8rem; color: #666;">Panel de Control v2.0</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div style="cursor:pointer; margin-bottom:15px;" onclick="location.href='cocina.html'">📋 Pedidos Activos</div>
        <div style="cursor:pointer; font-weight:bold; color:#c5a059;">📈 Reporte de Ventas</div>
    </div>

    <div class="content">
        <h1 style="margin-top:0;">Estadísticas de Negocio</h1>

        <div class="metrics">
            <div class="card">
                <h3>Ventas Hoy</h3>
                <p id="ventasHoy">$0</p>
            </div>
            <div class="card">
                <h3>Total Acumulado</h3>
                <p id="totalAcumulado">$0</p>
            </div>
            <div class="card">
                <h3>Ventas Exitosas</h3>
                <p id="numVentas">0</p>
            </div>
        </div>

        <div class="chart-section">
            <h3 style="margin-top:0;">Tendencia de Ingresos</h3>
            <canvas id="grafica" height="100"></canvas>
        </div>

        <div class="table-section">
            <table id="tablaVentas">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Mesa</th>
                        <th>Productos</th>
                        <th>Total</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDlGrzItpJAhtlrDyXLbIX46osGOk3k2s",
            authDomain: "la-vida-es-bella-a2e72.firebaseapp.com",
            databaseURL: "https://la-vida-es-bella-a2e72-default-rtdb.firebaseio.com",
            projectId: "la-vida-es-bella-a2e72",
            storageBucket: "la-vida-es-bella-a2e72.firebasestorage.app",
            messagingSenderId: "622395641878",
            appId: "1:622395641878:web:bc3afbeb29d73a59e8a537"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let miGrafica = null;

        db.ref("pedidos").on("value", snap => {
            const cuerpo = document.getElementById("cuerpoTabla");
            cuerpo.innerHTML = "";
            
            let dias = {};
            let totalGeneral = 0;
            let totalHoy = 0;
            let contador = 0;
            const hoy = new Date().toLocaleDateString();

            snap.forEach(p => {
                const pedido = p.val();
                if (pedido.estado === "entregado") {
                    const fecha = new Date(pedido.timestamp).toLocaleDateString();
                    const hora = new Date(pedido.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Sumar totales
                    totalGeneral += pedido.total;
                    contador++;
                    if (fecha === hoy) totalHoy += pedido.total;

                    // Datos para gráfica
                    dias[fecha] = (dias[fecha] || 0) + pedido.total;

                    // Llenar tabla
                    const nombresItems = pedido.items.map(i => i.nombre).join(", ");
                    cuerpo.insertAdjacentHTML('afterbegin', `
                        <tr>
                            <td>${fecha} <br><small style="color:#999">${hora}</small></td>
                            <td><b>${pedido.mesa}</b></td>
                            <td style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${nombresItems}</td>
                            <td><b>$${pedido.total.toLocaleString()}</b></td>
                            <td><span class="status-pill">Completado</span></td>
                        </tr>
                    `);
                }
            });

            // Actualizar tarjetas
            document.getElementById("ventasHoy").innerText = `$${totalHoy.toLocaleString()}`;
            document.getElementById("totalAcumulado").innerText = `$${totalGeneral.toLocaleString()}`;
            document.getElementById("numVentas").innerText = contador;

            // Renderizar gráfica
            if (miGrafica) miGrafica.destroy();
            const ctx = document.getElementById("grafica").getContext('2d');
            miGrafica = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(dias),
                    datasets: [{
                        label: 'Ventas Diarias',
                        data: Object.values(dias),
                        borderColor: '#c5a059',
                        backgroundColor: 'rgba(197, 160, 89, 0.1)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true } }
                }
            });
        });
    </script>
</body>
</html>
