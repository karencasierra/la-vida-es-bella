<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | La Vida es Bella</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --oro: #c5a059;
            --oro-brillante: #f1d592;
            --oscuro: #0a0a0a;
        }

        body {
            background: var(--oscuro);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--oro);
            font-size: 2rem;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--oro);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--oro), var(--oro-brillante));
            border: none;
            border-radius: 12px;
            color: #111;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4);
        }

        button:active { transform: translateY(0); }

        #mensaje {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #ff4444;
            display: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #111;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Acceso</h2>
        
        <input id="correo" type="email" placeholder="Usuario o Correo">
        <input id="pass" type="password" placeholder="Contraseña">
        
        <button onclick="login()" id="btnEntrar">
            <span id="btnText">Entrar</span>
            <div class="loader" id="btnLoader"></div>
        </button>

        <p id="mensaje">Credenciales incorrectas</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDlGrzItpJAhtlrDyXLbIX46osGOk3k2s",
            authDomain: "la-vida-es-bella-a2e72.firebaseapp.com",
            databaseURL: "https://la-vida-es-bella-a2e72-default-rtdb.firebaseio.com",
            projectId: "la-vida-es-bella-a2e72",
            storageBucket: "la-vida-es-bella-a2e72.firebasestorage.app",
            messagingSenderId: "622395641878",
            appId: "1:622395641878:web:bc3afbeb29d73a59e8a537"
        };

        firebase.initializeApp(firebaseConfig);

        function login() {
            const c = document.getElementById("correo").value;
            const p = document.getElementById("pass").value;
            const btnText = document.getElementById("btnText");
            const btnLoader = document.getElementById("btnLoader");
            const mensaje = document.getElementById("mensaje");

            if(!c || !p) return;

            // Animación de carga
            btnText.style.display = "none";
            btnLoader.style.display = "block";
            mensaje.style.display = "none";

            firebase.auth().signInWithEmailAndPassword(c, p)
            .then(() => {
                // Redirigir a la cocina/administración
                location.href = "cocina.html"; 
            })
            .catch((error) => {
                console.error(error);
                btnText.style.display = "block";
                btnLoader.style.display = "none";
                mensaje.style.display = "block";
            });
        }

        // Permitir entrar con la tecla Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>

</body>
</html>
