<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Vida es Bella</title>

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* MARCA DE AGUA */
body::before {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    background: url('logo.jpg') no-repeat center;
    background-size: contain;
    opacity: 0.04;
    transform: translate(-50%, -50%);
    z-index: 0;
}

/* PORTADA */
.hero {
    position: relative;
    z-index: 1;
    height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 20px;
}

.logo {
    width: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    padding: 6px;
    border: 2px solid #d4af37;
    box-shadow: 0 0 20px rgba(0,194,178,0.4);
}

.hero h1 {
    color: #d4af37;
}

.sub {
    color: #00c2b2;
}

/* NAV */
.nav {
    position: relative;
    z-index: 1;
    display: flex;
    overflow-x: auto;
    padding: 15px;
    gap: 10px;
}

.nav button {
    border: none;
    padding: 10px 18px;
    border-radius: 20px;
    background: #1a1a1a;
    color: #00c2b2;
    font-weight: bold;
    cursor: pointer;
}

/* CONTENIDO */
.container {
    position: relative;
    z-index: 1;
    padding: 15px;
}

/* TARJETAS */
.card {
    background: #121212;
    border-radius: 15px;
    margin-bottom: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.info {
    padding: 15px;
}

.nombre {
    font-size: 18px;
}

.precio {
    color: #00c2b2;
    font-weight: bold;
}

/* BOTON */
.btn {
    margin-top: 10px;
    background: #d4af37;
    border: none;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
    cursor: pointer;
}

/* CONTACTO */
.contacto {
    background: #111;
    padding: 25px;
    text-align: center;
}

.contacto h2 {
    color: #d4af37;
}

.contacto a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
    color: #00c2b2;
    text-decoration: none;
    font-size: 16px;
}

/* CARRITO */
.carrito {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00c2b2;
    color: black;
    padding: 15px;
    border-radius: 50px;
    font-weight: bold;
    z-index: 2;
}

</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero">
    <img src="logo.jpeg.jpeg" class="logo">
    <h1>La Vida es Bella</h1>
    <p class="sub">Gastrobar</p>
</div>

<!-- CATEGORIAS -->
<div class="nav">
    <button onclick="mostrar('almuerzos')">🍽️ Almuerzos</button>
    <button onclick="mostrar('mar')">🦐 Mar</button>
    <button onclick="mostrar('rapidas')">🍔 Rápidas</button>
    <button onclick="mostrar('bebidas')">🍹 Bebidas</button>
    <button onclick="mostrar('todos')">🔄 Todo</button>
</div>

<!-- MENU -->
<div class="container">

<div class="card almuerzos">
    <img src="https://via.placeholder.com/400x200">
    <div class="info">
        <div class="nombre">Almuerzo Ejecutivo</div>
        <div class="precio">$15.000</div>
        <button class="btn">Agregar</button>
    </div>
</div>

<div class="card mar">
    <img src="https://via.placeholder.com/400x200">
    <div class="info">
        <div class="nombre">Camarones al Ajillo</div>
        <div class="precio">$28.000</div>
        <button class="btn">Agregar</button>
    </div>
</div>

<div class="card rapidas">
    <img src="https://via.placeholder.com/400x200">
    <div class="info">
        <div class="nombre">Hamburguesa Especial</div>
        <div class="precio">$18.000</div>
        <button class="btn">Agregar</button>
    </div>
</div>

<div class="card bebidas">
    <img src="https://via.placeholder.com/400x200">
    <div class="info">
        <div class="nombre">Mojito</div>
        <div class="precio">$15.000</div>
        <button class="btn">Agregar</button>
    </div>
</div>

</div>

<!-- CONTACTO -->
<div class="contacto">
    <h2>📞 Contáctanos</h2>

    <a href="https://wa.me/573207999205" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a href="mailto:gastrobarlavidaesbella@hotmail.com">
        <i class="fas fa-envelope"></i> Correo Gmail
    </a>

    <a href="#" target="_blank">
        <i class="fab fa-facebook"></i> Facebook
    </a>

    <p>📱 320 799 9205</p>
</div>

<!-- CARRITO -->
<div class="carrito">
🛒 Pedido
</div>

<script>
function mostrar(categoria) {
    let items = document.querySelectorAll('.card');

    items.forEach(item => item.style.display = 'none');

    if(categoria === 'todos'){
        items.forEach(item => item.style.display = 'block');
        return;
    }

    let seleccionados = document.querySelectorAll('.' + categoria);

    seleccionados.forEach(item => {
        item.style.display = 'block';
    });
}

window.onload = function() {
    mostrar('todos');
}
</script>

</body>
</html>
